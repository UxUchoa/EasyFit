name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/easyfit_test
      DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/easyfit_test
      SESSION_SECRET: build-only-secret-that-is-never-used-at-runtime
      APP_URL: http://localhost:3000
      RUN_INTEGRATION_TESTS: '1'
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: easyfit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm
      - run: npm ci
      - run: npm run prisma:generate
      - name: Create Supabase-compatible API roles
        env:
          PGPASSWORD: postgres
        run: psql --host 127.0.0.1 --username postgres --dbname easyfit_test --command "CREATE ROLE anon NOLOGIN; CREATE ROLE authenticated NOLOGIN;"
      - run: npm exec prisma migrate deploy
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run test:integration
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - run: npm run build
